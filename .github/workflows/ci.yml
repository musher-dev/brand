name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tokens-build:
    name: Build tokens
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: tokens

      - name: Build tokens
        run: bun run build
        working-directory: tokens

      - name: Verify build output
        run: |
          test -f dist/css/variables.css || { echo "Missing dist/css/variables.css"; exit 1; }
          test -f dist/css/variables.light.css || { echo "Missing dist/css/variables.light.css"; exit 1; }
          test -f dist/tailwind/theme.css || { echo "Missing dist/tailwind/theme.css"; exit 1; }
          test -f dist/tailwind/theme.light.css || { echo "Missing dist/tailwind/theme.light.css"; exit 1; }
          echo "Build output verified"
        working-directory: tokens

  validate-assets:
    name: Validate assets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate
        run: bash scripts/validate.sh

  export-freshness:
    name: Verify dist/ matches fresh export
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install asset tools
        run: npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: '3.x'

      - name: Run export
        run: task export

      - name: Check for drift
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date. Run 'task export' locally and commit the result."
            exit 1
          fi

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: ShellCheck
        run: shellcheck scripts/*.sh
