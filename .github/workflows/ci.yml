name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build & check workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install workspace
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run --filter '*' build

      - name: Typecheck / check
        run: bun run --filter '*' check

      - name: Lint
        run: bun run --filter '*' lint

      - name: Validate package exports (publint)
        run: bun run --filter '*' publint

  export-freshness:
    name: Verify brand-assets dist/ matches fresh export
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install workspace
        run: bun install --frozen-lockfile

      - name: Run export
        run: bun run --filter '@musher-dev/brand-assets' export

      - name: Check for drift
        run: |
          if ! git diff --exit-code packages/brand-assets/dist/; then
            echo "::error::packages/brand-assets/dist/ is out of date. Run 'bun run --filter @musher-dev/brand-assets export' locally and commit the result."
            exit 1
          fi

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ShellCheck
        run: shellcheck packages/brand-assets/scripts/*.sh
