# Musher Design System Taskfile
# Usage: task [task-name]
# List tasks: task --list

version: '3'

includes:
  tokens:
    taskfile: packages/design-tokens/Taskfile.yml
    dir: packages/design-tokens
  assets:
    taskfile: packages/brand-assets/Taskfile.yml
    dir: packages/brand-assets

tasks:
  setup:
    desc: Install the workspace (single root bun.lock)
    cmds:
      - bun install

  build:
    desc: Build all packages
    cmds:
      - bun run --filter '*' build

  ui:dev:
    desc: Build tokens then run the svelte-ui Storybook (dev)
    cmds:
      - bun run dev:ui

  ui:storybook:
    desc: Build tokens then build the svelte-ui Storybook (static)
    cmds:
      - bun run storybook:build

  # --- Asset pipeline (delegated to brand-assets) ---
  optimize:
    desc: Optimize SVGs and PNGs in brand-assets/src/
    cmds:
      - task: assets:optimize

  export:
    desc: Export optimized assets from src/ to dist/
    cmds:
      - task: assets:export

  validate:
    desc: Validate brand asset naming conventions
    cmds:
      - task: assets:validate

  clean:
    desc: Clean all build output
    cmds:
      - bun run --filter '*' clean
